<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Report - MIT Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: sans-serif; }
        .card { background-color: #1a1a1a; border: 1px solid #333; border-radius: 15px; }
        .table { color: #e0e0e0; }
        .text-success-custom { color: #00ff00; }
        .btn-danger-custom { background-color: #dc3545; border: none; }
        .btn-danger-custom:hover { background-color: #a71d2a; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="card p-4 shadow">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Attendance <span class="text-success-custom">History</span></h2>
            <div>
                <a href="/clear_attendance" class="btn btn-danger btn-sm me-2" 
                   onclick="return confirm('Are you sure you want to delete ALL attendance records? This cannot be undone.')">
                   Clear All Logs
                </a>

                <a href="/download_attendance" class="btn btn-primary btn-sm me-2">Download CSV</a>
                
                <a href="/" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover table-dark mt-2">
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Date</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in data %}
                    <tr>
                        <td>{{ row[0] }}</td>
                        <td>{{ row[1] }}</td>
                        <td>{{ row[2] }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center text-muted">No attendance records found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
