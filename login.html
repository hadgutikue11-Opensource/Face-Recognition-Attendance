<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MIT AI System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #0f0f0f; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card { 
            background-color: #1a1a1a; 
            border: 1px solid #333; 
            border-radius: 15px; 
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
        .text-success-custom { color: #00ff00; }
        .form-control {
            background-color: #252525;
            border: 1px solid #444;
            color: white;
        }
        .form-control:focus {
            background-color: #2d2d2d;
            border-color: #00ff00;
            color: white;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }
        .btn-login {
            background-color: #00ff00;
            color: black;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #00cc00;
            transform: translateY(-2px);
        }
        .mit-logo {
            display: block;
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>

<div class="login-card p-4 shadow">
    <img src="{{ url_for('static', filename='mit_logo.png') }}" alt="MIT Logo" width="80" class="mit-logo">
    
    <div class="text-center mb-4">
        <h2 class="fw-bold">Admin <span class="text-success-custom">Login</span></h2>
        <p class="text-muted small">Mekelle Institute of Technology</p>
    </div>

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter admin username" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-login w-100 p-2">Sign In</button>
    </form>

    <div class="mt-4 text-center">
        <a href="/" class="text-success-custom text-decoration-none small">← Back to Dashboard</a>
    </div>
</div>

</body>
</html>
