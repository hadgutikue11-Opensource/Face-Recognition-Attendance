<!DOCTYPE html>
<html>
<head>
    <title>Register New User</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; }
        form { margin-top: 50px; background: #1e1e1e; padding: 30px; display: inline-block; border-radius: 10px; }
        input { margin: 10px; padding: 10px; width: 250px; background: #333; color: white; border: 1px solid #444; }
        button { padding: 10px 20px; background: #00ff00; border: none; cursor: pointer; font-weight: bold; color: black; }
        button:hover { background: #00cc00; }
    </style>
</head>
<body>
    <h1>Register New Person</h1>
    
    <form action="/register_student" method="post" enctype="multipart/form-data">
        
        <input type="text" name="student_name" placeholder="Enter Full Name" required><br>
        
        <input type="file" name="student_image" accept="image/*" required><br>
        
        <button type="submit">Upload & Register</button>
    </form>
    
    <br><br>
    <a href="/" style="color: #00ff00; text-decoration: none;">Back to Dashboard</a>
</body>
</html>
